<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mobilité">
<meta name="theme-color" content="#0a0a0b">
<title>Protocole Mobilité — Suivi</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0b;
  --surface: #141416;
  --surface-2: #1c1c20;
  --surface-3: #252529;
  --border: #2a2a30;
  --border-light: #333339;
  --text: #e8e8ec;
  --text-dim: #8a8a96;
  --text-muted: #5a5a66;
  --accent: #ff6b35;
  --accent-dim: #ff6b3518;
  --accent-glow: #ff6b3530;
  --accent-2: #4ecdc4;
  --accent-2-dim: #4ecdc418;
  --accent-3: #a78bfa;
  --accent-3-dim: #a78bfa18;
  --green: #34d399;
  --green-dim: #34d39915;
  --green-solid: #34d39930;
  --yellow: #fbbf24;
  --yellow-dim: #fbbf2418;
  --red: #f87171;
  --check-size: 22px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  padding-bottom: env(safe-area-inset-bottom, 0);
}

/* ===== HEADER ===== */
.app-header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: rgba(10,10,11,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  padding-top: calc(12px + env(safe-area-inset-top, 0));
}
.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.app-title {
  font-family: 'Space Mono', monospace;
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.app-title span { color: var(--accent); }

.week-indicator {
  font-size: 0.72rem;
  color: var(--accent-2);
  background: var(--accent-2-dim);
  padding: 4px 10px;
  border-radius: 6px;
  font-weight: 600;
}

/* Progress bar */
.week-progress {
  display: flex;
  gap: 3px;
  margin-bottom: 10px;
}
.wp-dot {
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: var(--surface-3);
  transition: background 0.3s, box-shadow 0.3s;
}
.wp-dot.done {
  background: var(--green);
  box-shadow: 0 0 6px var(--green-dim);
}
.wp-dot.partial {
  background: var(--yellow);
}
.wp-dot.today {
  box-shadow: 0 0 0 2px var(--accent), 0 0 8px var(--accent-glow);
}

/* Phase tabs */
.phase-tabs {
  display: flex;
  gap: 6px;
}
.phase-tab {
  flex: 1;
  padding: 7px 0;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 0.72rem;
  font-weight: 700;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.phase-tab.active {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-dim);
}

/* ===== MAIN ===== */
.container {
  max-width: 500px;
  margin: 0 auto;
  padding: 16px 14px 120px;
}

/* Session selector */
.session-toggle {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
}
.session-btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  font-family: 'DM Sans', sans-serif;
  position: relative;
  overflow: hidden;
}
.session-btn .s-icon { font-size: 1.1rem; display: block; margin-bottom: 2px; }
.session-btn .s-time { font-size: 0.68rem; color: var(--text-muted); display: block; margin-top: 2px; }
.session-btn.active.morning {
  border-color: var(--yellow);
  color: var(--yellow);
  background: var(--yellow-dim);
}
.session-btn.active.evening {
  border-color: var(--accent-3);
  color: var(--accent-3);
  background: var(--accent-3-dim);
}
.session-btn .s-check {
  position: absolute;
  top: 6px;
  right: 8px;
  font-size: 0.7rem;
  opacity: 0;
  transition: opacity 0.2s;
}
.session-btn .s-check.visible { opacity: 1; }

/* Day tabs (evening) */
.day-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
}
.day-tab {
  flex: 1;
  padding: 8px 0;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 0.72rem;
  font-weight: 600;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
  position: relative;
}
.day-tab.active {
  border-color: var(--accent-2);
  color: var(--accent-2);
  background: var(--accent-2-dim);
}
.day-tab .day-check {
  display: block;
  font-size: 0.6rem;
  margin-top: 1px;
  opacity: 0;
  transition: opacity 0.2s;
}
.day-tab .day-check.visible { opacity: 1; }

/* Focus label */
.focus-label {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--accent-2);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 14px;
  padding-left: 2px;
}

/* ===== EXERCISE CARD ===== */
.exercise-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.2s, opacity 0.3s;
}
.exercise-card.completed {
  opacity: 0.55;
  border-color: var(--green-solid);
}

.ex-main {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 14px;
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
}

/* Custom checkbox */
.ex-check {
  width: var(--check-size);
  height: var(--check-size);
  min-width: var(--check-size);
  border-radius: 7px;
  border: 2px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.ex-check svg {
  width: 13px;
  height: 13px;
  opacity: 0;
  transform: scale(0.5);
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  stroke: white;
  stroke-width: 3;
  fill: none;
}
.exercise-card.completed .ex-check {
  background: var(--green);
  border-color: var(--green);
  box-shadow: 0 0 10px var(--green-dim);
}
.exercise-card.completed .ex-check svg {
  opacity: 1;
  transform: scale(1);
}

.ex-info { flex: 1; min-width: 0; }
.ex-name {
  font-weight: 600;
  font-size: 0.88rem;
  line-height: 1.3;
  margin-bottom: 2px;
}
.ex-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  font-size: 0.7rem;
  color: var(--text-muted);
}
.ex-meta span {
  background: var(--surface-2);
  padding: 2px 7px;
  border-radius: 4px;
}

.ex-expand {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 0.8rem;
  transition: transform 0.2s;
  flex-shrink: 0;
}
.exercise-card.open .ex-expand { transform: rotate(180deg); }

/* Expandable detail */
.ex-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
.exercise-card.open .ex-detail {
  max-height: 600px;
}
.ex-detail-inner {
  padding: 0 14px 14px;
  border-top: 1px solid var(--border);
  margin-top: 0;
  padding-top: 12px;
}
.ex-instructions {
  font-size: 0.82rem;
  color: var(--text-dim);
  line-height: 1.65;
  margin-bottom: 10px;
}
.ex-instructions strong { color: var(--text); }

.ex-targets {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 10px;
}
.ex-target {
  font-size: 0.68rem;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--green-dim);
  color: var(--green);
  font-weight: 600;
}

.ex-tip {
  font-size: 0.78rem;
  color: var(--yellow);
  background: var(--yellow-dim);
  padding: 8px 12px;
  border-radius: 8px;
  margin-bottom: 10px;
  line-height: 1.5;
}

.ex-equip {
  display: inline-block;
  font-size: 0.7rem;
  color: var(--accent-2);
  background: var(--accent-2-dim);
  padding: 2px 8px;
  border-radius: 4px;
  margin-bottom: 10px;
  font-weight: 600;
}

.ex-video {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.78rem;
  color: var(--red);
  text-decoration: none;
  font-weight: 600;
  padding: 6px 10px;
  border-radius: 8px;
  background: #f8717118;
}

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: rgba(10,10,11,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 16px;
  padding-bottom: calc(8px + env(safe-area-inset-bottom, 0));
  gap: 4px;
}
.nav-btn {
  flex: 1;
  padding: 8px 0;
  border: none;
  background: none;
  color: var(--text-muted);
  font-size: 0.65rem;
  font-weight: 600;
  text-align: center;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}
.nav-btn .nav-icon { font-size: 1.2rem; display: block; margin-bottom: 2px; }
.nav-btn.active { color: var(--accent); background: var(--accent-dim); }

/* ===== PAGES ===== */
.page { display: none; }
.page.active { display: block; }

/* ===== STATS PAGE ===== */
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 10px;
}
.stat-label {
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}
.stat-value {
  font-family: 'Space Mono', monospace;
  font-size: 1.5rem;
  font-weight: 700;
}
.stat-sub {
  font-size: 0.78rem;
  color: var(--text-dim);
  margin-top: 2px;
}
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

/* Calendar grid */
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-top: 10px;
}
.cal-header {
  text-align: center;
  font-size: 0.65rem;
  color: var(--text-muted);
  font-weight: 600;
  padding: 4px 0;
}
.cal-day {
  aspect-ratio: 1;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-muted);
  background: var(--surface-2);
  position: relative;
}
.cal-day.empty { background: none; }
.cal-day.done { background: var(--green-dim); color: var(--green); }
.cal-day.partial { background: var(--yellow-dim); color: var(--yellow); }
.cal-day.today { box-shadow: 0 0 0 2px var(--accent); color: var(--text); }
.cal-day.future { opacity: 0.3; }

/* ===== TESTS PAGE ===== */
.test-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
}
.test-title {
  font-weight: 700;
  font-size: 0.9rem;
  margin-bottom: 4px;
}
.test-desc {
  font-size: 0.78rem;
  color: var(--text-dim);
  margin-bottom: 12px;
  line-height: 1.5;
}
.test-inputs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.test-input-group {
  flex: 1;
  min-width: 80px;
}
.test-input-label {
  font-size: 0.65rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}
.test-input {
  width: 100%;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}
.test-input:focus { border-color: var(--accent); }
.test-input::placeholder { color: var(--text-muted); }

.test-save-btn {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: white;
  font-weight: 700;
  font-size: 0.82rem;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: opacity 0.2s;
}
.test-save-btn:active { opacity: 0.8; }

.test-history {
  margin-top: 10px;
  font-size: 0.75rem;
  color: var(--text-dim);
}
.test-history-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
}
.test-history-row:last-child { border-bottom: none; }

/* RESET */
.reset-section {
  margin-top: 30px;
  padding: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  text-align: center;
}
.reset-btn {
  padding: 10px 24px;
  border-radius: 10px;
  border: 1px solid var(--red);
  background: none;
  color: var(--red);
  font-weight: 700;
  font-size: 0.82rem;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  margin-top: 8px;
}
.reset-hint {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 6px;
}

/* SECTION TITLE */
.section-title {
  font-family: 'Space Mono', monospace;
  font-size: 0.9rem;
  font-weight: 700;
  margin-bottom: 14px;
  padding-left: 2px;
}

/* Session complete badge */
.session-complete {
  text-align: center;
  padding: 20px;
  margin-bottom: 16px;
  background: var(--green-dim);
  border: 1px solid var(--green-solid);
  border-radius: 14px;
  display: none;
}
.session-complete.visible { display: block; }
.session-complete .sc-icon { font-size: 2rem; margin-bottom: 6px; }
.session-complete .sc-text { font-size: 0.88rem; font-weight: 700; color: var(--green); }
.session-complete .sc-sub { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; }

/* Animations */
@keyframes checkPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
.exercise-card.just-checked .ex-check {
  animation: checkPop 0.3s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.exercise-card {
  animation: slideUp 0.3s ease forwards;
}

@media (max-width: 380px) {
  .ex-name { font-size: 0.82rem; }
  .container { padding: 12px 10px 120px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <div class="header-top">
    <div class="app-title">PROTO <span>MOBILITÉ</span></div>
    <div class="week-indicator" id="weekIndicator">Sem 1 · Phase 1</div>
  </div>
  <div class="week-progress" id="weekProgress"></div>
  <div class="phase-tabs" id="phaseTabs"></div>
</div>

<!-- PAGE: WORKOUT -->
<div class="container">
  <div class="page active" id="page-workout">
    <div class="session-toggle" id="sessionToggle"></div>
    <div class="day-tabs" id="dayTabs"></div>
    <div class="focus-label" id="focusLabel"></div>
    <div class="session-complete" id="sessionComplete">
      <div class="sc-icon">✅</div>
      <div class="sc-text">Séance terminée !</div>
      <div class="sc-sub" id="scSub"></div>
    </div>
    <div id="exerciseList"></div>
  </div>

  <div class="page" id="page-stats">
    <div class="section-title">📊 Statistiques</div>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="stat-card">
      <div class="stat-label">Calendrier</div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </div>

  <div class="page" id="page-tests">
    <div class="section-title">🎯 Tests de progression</div>
    <p style="font-size:0.78rem; color:var(--text-dim); margin-bottom:16px;">Fais ces tests en Semaine 1, 3 et 6 pour mesurer tes progrès.</p>
    <div id="testCards"></div>
    <div class="reset-section">
      <div style="font-size:0.82rem; font-weight:600; color:var(--text-dim);">Réinitialiser les données</div>
      <button class="reset-btn" onclick="resetData()">Tout effacer</button>
      <div class="reset-hint">Cette action est irréversible</div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="switchPage('workout')" id="nav-workout">
    <span class="nav-icon">🏋️</span>Séance
  </button>
  <button class="nav-btn" onclick="switchPage('stats')" id="nav-stats">
    <span class="nav-icon">📊</span>Stats
  </button>
  <button class="nav-btn" onclick="switchPage('tests')" id="nav-tests">
    <span class="nav-icon">🎯</span>Tests
  </button>
</div>

<script>
// ============================================================
// DATA: All exercises organized by phase > session > day
// ============================================================
const PROGRAM = {
  phases: [
    {
      id: 'p1', name: 'Phase 1', label: 'Sem 1-2', weeks: [1,2],
      morning: {
        exercises: [
          { id:'p1m1', name:'Cat-Cow', meta:['50 sec','10 cycles'], targets:['Colonne complète','Mobilité segmentaire'], instructions:'À quatre pattes, mains sous les épaules, genoux sous les hanches. Inspire : creuse le dos, relève la tête. Expire : arrondis le dos au maximum, rentre le menton. 5 secondes par position.', video:'https://www.youtube.com/results?search_query=cat+cow+stretch+mobilit%C3%A9+dos' },
          { id:'p1m2', name:'90/90 Hip Switch', meta:['90 sec','8 transitions','3 sec/côté'], targets:['Rotation interne hanche','Rotation externe hanche'], instructions:'Assis au sol, jambes en 90/90. Pivote les deux jambes pour changer de côté. Garde le torse droit, 3 sec de pause par côté. Bloc yoga sous la fesse si nécessaire.', tip:'Si une hanche est plus raide, passe 1 rep de plus du côté raide.', video:'https://www.youtube.com/results?search_query=90+90+hip+switch+mobility+drill' },
          { id:'p1m3', name:'Deep Squat Hold (Assisté)', meta:['60 sec','2×30 sec','10 sec repos'], targets:['Flexion hanche','Dorsiflexion cheville','Décompression lombaire'], instructions:'Squat profond, tiens-toi à un montant de porte. Pieds largeur d\'épaules, pointes 30° vers l\'extérieur. Pousse les genoux dehors avec les coudes. Respire : 4 sec inspire, 6 sec expire.', tip:'Talons qui décollent ? Place-les sur un livre de 2-3 cm.', video:'https://www.youtube.com/results?search_query=deep+squat+hold+mobility+assisted' },
          { id:'p1m4', name:'Forward Fold + Respiration', meta:['60 sec','1×60 sec'], targets:['Ischio-jambiers','Fascia thoraco-lombaire','Relâchement nerveux'], instructions:'Debout, pieds joints, laisse-toi tomber vers l\'avant. Ne tire pas, laisse la gravité faire. Balance doucement. À chaque expiration, relâche un peu plus. Note où arrivent tes mains.', tip:'Ce qui te bloque c\'est ton système nerveux, pas tes muscles. La respiration lente le convainc de lâcher.', video:'https://www.youtube.com/results?search_query=standing+forward+fold+stretch+ragdoll' }
        ]
      },
      evening: {
        days: [
          { id:'d1', name:'LUN', fullName:'Lundi', focus:'Hanches : Flexion + Adducteurs',
            exercises: [

              { id:'p1e1d1c', name:'90/90 Stretch tenu + Inclinaison', meta:['2 min 30','45 sec/côté + 15 sec incliné'], targets:['Rotation externe profonde','Piriforme','Capsule hanche'], equip:'Bloc yoga', instructions:'Position 90/90, reste d\'un côté. Bloc sous la fesse si nécessaire. Tiens 45 sec, puis incline le torse vers l\'avant par-dessus le tibia, 15 sec. Change de côté.', video:'https://www.youtube.com/results?search_query=90+90+stretch+hip+lean+forward' },
              { id:'p1e1d1d', name:'Deep Squat Hold + Poussée coudes', meta:['2 min','2×45 sec','15 sec repos'], targets:['Flexion hanche maximale','Adducteurs','Cheville'], instructions:'Squat profond sans aide si possible. Mains jointes (position prière), coudes contre les genoux. Pousse les genoux vers l\'extérieur. Respire longuement.', video:'https://www.youtube.com/results?search_query=deep+squat+hold+elbow+push+knees' }
            ]

          { id:'d2', name:'MAR', fullName:'Mardi', focus:'Chaîne Postérieure',
            exercises: [
              { id:'p1e1d2a', name:'Jefferson Curl — Poids de corps', meta:['3 min','8 reps','Tempo 5-0-5-0'], targets:['Érecteurs du rachis','Ischio-jambiers','Fascia thoraco-lombaire'], instructions:'Sur une marche (10-15 cm). Pieds joints. Menton vers poitrine, déroule vertèbre par vertèbre. Mains descendent le long des jambes. 5 sec descente, 5 sec montée. Jambes quasi tendues.', tip:'C\'est L\'EXERCICE le plus efficace pour toucher tes orteils. Le déroulé segmentaire réapprend à ton système nerveux que l\'amplitude est sûre.', video:'https://www.youtube.com/results?search_query=jefferson+curl+bodyweight+tutorial+mobility' },
              { id:'p1e1d2b', name:'Ischio-jambiers actifs — PNF', meta:['3 min','5 cycles/jambe','5 sec contraction'], targets:['Ischio-jambiers','Inhibition réciproque','Technique PNF'], instructions:'Allongé sur le dos, une jambe levée. Attrape l\'arrière de la cuisse, tends la jambe en contractant le quadriceps (5 sec). Puis POUSSE la jambe vers le bas contre tes mains (5 sec à 50%). Relâche et gagne l\'amplitude. 5 cycles/jambe.', tip:'La technique PNF est la méthode la plus rapide prouvée scientifiquement. Gain de 2-5° par cycle.', video:'https://www.youtube.com/results?search_query=PNF+hamstring+stretch+contract+relax' },
              { id:'p1e1d2c', name:'Elephant Walk', meta:['2 min','5 allers-retours'], targets:['Ischio-jambiers dynamique','Mollets','Fascia postérieur'], instructions:'Mains au sol, jambes quasi tendues. Avance en petits pas alternés mains/pieds. Talons cherchent le sol. 4-5 pas aller, 4-5 pas retour.', video:'https://www.youtube.com/results?search_query=elephant+walk+hamstring+mobility+drill' },
              { id:'p1e1d2d', name:'Forward Fold progressif', meta:['2 min','2×50 sec','10 sec repos'], targets:['Chaîne postérieure complète','Relâchement nerveux'], instructions:'Debout, pieds joints. Relâche vers l\'avant. Genoux légèrement pliés au début, tends progressivement. Respire en 4-6-8. Ne tire pas, ne rebondis pas.', video:'https://www.youtube.com/results?search_query=standing+forward+fold+progressive+stretch' }

          { id:'d3', name:'MER', fullName:'Mercredi', focus:'Extension Hanche + Psoas',

              { id:'p1e1d4b', name:'Thread the Needle', meta:['3 min','8 reps/côté','2 sec tenu'], targets:['Rotation thoracique','Grand dorsal','Rhomboïdes'], instructions:'À quatre pattes. Passe le bras droit sous le corps en tournant, épaule/joue au sol (2 sec). Puis ouvre le même bras vers le plafond (2 sec). Mouvement fluide. 8 reps/côté.', video:'https://www.youtube.com/results?search_query=thread+the+needle+thoracic+mobilit%C3%A9' },

              { id:'p1e1d5b', name:'Inchworm + Squat', meta:['3 min','6 reps'], targets:['Chaîne postérieure dynamique','Core','Flexion hanche'], instructions:'Mains au sol, marche vers l\'avant en planche, pompe optionnelle, marche les pieds vers les mains, squat profond 3 sec, remonte.', video:'https://www.youtube.com/results?search_query=inchworm+to+squat+mobility+flow' },

// ============================================================
// STATE
// ============================================================
let state = {
  currentPhase: 0,
  currentSession: 'morning',
  currentDay: 0,
  currentPage: 'workout',
  startDate: null,
  completed: {},
  tests: {}
};

function loadState() {
  try {
    const saved = localStorage.getItem('mobilite_state_v2');
    if (saved) {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
    }
    if (!state.startDate) {
      state.startDate = new Date().toISOString().split('T')[0];
      saveState();
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('mobilite_state_v2', JSON.stringify(state));
  } catch(e) {}
}

function resetData() {
  if (confirm('Effacer TOUTES les données ? Cette action est irréversible.')) {
    localStorage.removeItem('mobilite_state_v2');
    state = { currentPhase:0, currentSession:'morning', currentDay:0, currentPage:'workout', startDate:new Date().toISOString().split('T')[0], completed:{}, tests:{} };
    saveState();
    renderAll();
  }
}

// ============================================================
// HELPERS
// ============================================================
function getTodayStr() { return new Date().toISOString().split('T')[0]; }

function getCurrentWeek() {
  const start = new Date(state.startDate);
  const today = new Date(getTodayStr());
  const diff = Math.floor((today - start) / (1000*60*60*24));
  return Math.min(Math.floor(diff / 7) + 1, 6);
}

function getDayOfWeek() {
  return new Date().getDay(); // 0=Sun,1=Mon...
}

function getPhaseForWeek(week) {
  if (week <= 2) return 0;
  if (week <= 4) return 1;
  return 2;
}

function getCompletionKey(date, phaseIdx, session, dayIdx) {
  return `${date}_p${phaseIdx}_${session}_d${dayIdx}`;
}

function isExerciseCompleted(key, exId) {
  return state.completed[key] && state.completed[key].includes(exId);
}

function toggleExercise(key, exId) {
  if (!state.completed[key]) state.completed[key] = [];
  const idx = state.completed[key].indexOf(exId);
  if (idx > -1) {
    state.completed[key].splice(idx, 1);
  } else {
    state.completed[key].push(exId);
  }
  saveState();
}

function getSessionExercises(phaseIdx, session, dayIdx) {
  const phase = PROGRAM.phases[phaseIdx];
  if (session === 'morning') return phase.morning.exercises;
  return phase.evening.days[dayIdx].exercises;
}

function getSessionCompletionCount(date, phaseIdx, session, dayIdx) {
  const key = getCompletionKey(date, phaseIdx, session, dayIdx);
  const exs = getSessionExercises(phaseIdx, session, dayIdx);
  const done = state.completed[key] || [];
  return { done: done.length, total: exs.length };
}

function isDateFullyComplete(date) {
  const week = (() => {
    const start = new Date(state.startDate);
    const d = new Date(date);
    return Math.min(Math.floor((d - start) / (1000*60*60*24*7)) + 1, 6);
  })();
  const phaseIdx = getPhaseForWeek(week);
  const dow = new Date(date).getDay();
  if (dow === 0 || dow === 6) return null;
  const dayIdx = dow - 1;
  const m = getSessionCompletionCount(date, phaseIdx, 'morning', 0);
  const e = getSessionCompletionCount(date, phaseIdx, 'evening', dayIdx);
  if (m.done === m.total && e.done === e.total) return 'done';
  if (m.done > 0 || e.done > 0) return 'partial';
  return 'none';
}

// ============================================================
// RENDER
// ============================================================
function renderAll() {
  renderHeader();
  renderSessionToggle();
  renderDayTabs();
  renderExercises();
  renderStats();
  renderTests();
}

function renderHeader() {
  const week = getCurrentWeek();
  const phaseIdx = getPhaseForWeek(week);
  const phase = PROGRAM.phases[phaseIdx];
  document.getElementById('weekIndicator').textContent = `Sem ${week} · ${phase.name}`;

  // Phase tabs
  const tabsHtml = PROGRAM.phases.map((p, i) => 
    `<button class="phase-tab ${i===state.currentPhase?'active':''}" onclick="setPhase(${i})">${p.label}</button>`
  ).join('');
  document.getElementById('phaseTabs').innerHTML = tabsHtml;

  // Week progress (10 dots for 2 weeks × 5 days)
  const today = getTodayStr();
  const start = new Date(state.startDate);
  let dotsHtml = '';
  for (let w = state.currentPhase * 2; w < state.currentPhase * 2 + 2; w++) {
    for (let d = 0; d < 5; d++) {
      const dayOffset = w * 7 + d + (d >= 0 ? 1 : 0);
      const date = new Date(start);
      date.setDate(date.getDate() + dayOffset + Math.floor(d/5)*2);
      
      const actualDate = new Date(start);
      actualDate.setDate(actualDate.getDate() + w * 7 + d + 1);
      const dateStr = actualDate.toISOString().split('T')[0];
      const status = isDateFullyComplete(dateStr);
      
      let cls = 'wp-dot';
      if (dateStr === today) cls += ' today';
      if (status === 'done') cls += ' done';
      else if (status === 'partial') cls += ' partial';
      dotsHtml += `<div class="${cls}"></div>`;
    }
  }
  document.getElementById('weekProgress').innerHTML = dotsHtml;
}

function renderSessionToggle() {
  const today = getTodayStr();
  const pi = state.currentPhase;
  const dow = getDayOfWeek();
  const dayIdx = Math.max(0, Math.min(dow - 1, 4));

  const mCount = getSessionCompletionCount(today, pi, 'morning', 0);
  const eCount = getSessionCompletionCount(today, pi, 'evening', dayIdx);
  const mDone = mCount.done === mCount.total && mCount.total > 0;
  const eDone = eCount.done === eCount.total && eCount.total > 0;

  document.getElementById('sessionToggle').innerHTML = `
    <button class="session-btn morning ${state.currentSession==='morning'?'active':''}" onclick="setSession('morning')">
      <span class="s-check ${mDone?'visible':''}">✅</span>
      <span class="s-icon">☀️</span>
      Matin
      <span class="s-time">5 min · Réveil</span>
    </button>
    <button class="session-btn evening ${state.currentSession==='evening'?'active':''}" onclick="setSession('evening')">
      <span class="s-check ${eDone?'visible':''}">✅</span>
      <span class="s-icon">🌙</span>
      Soir
      <span class="s-time">10 min · Spécifique</span>
    </button>
  `;
}

function renderDayTabs() {
  const container = document.getElementById('dayTabs');
  const label = document.getElementById('focusLabel');
  
  if (state.currentSession === 'morning') {
    container.style.display = 'none';
    label.textContent = 'Routine identique chaque jour';
    return;
  }
  
  container.style.display = 'flex';
  const phase = PROGRAM.phases[state.currentPhase];
  const today = getTodayStr();
  
  container.innerHTML = phase.evening.days.map((day, i) => {
    const count = getSessionCompletionCount(today, state.currentPhase, 'evening', i);
    const done = count.done === count.total && count.total > 0;
    return `<button class="day-tab ${i===state.currentDay?'active':''}" onclick="setDay(${i})">
      ${day.name}
      <span class="day-check ${done?'visible':''}">✅</span>
    </button>`;
  }).join('');

  label.textContent = phase.evening.days[state.currentDay].focus;
}

function renderExercises() {
  const today = getTodayStr();
  const pi = state.currentPhase;
  const sess = state.currentSession;
  const di = sess === 'morning' ? 0 : state.currentDay;
  const key = getCompletionKey(today, pi, sess, di);
  const exercises = getSessionExercises(pi, sess, di);
  
  const allDone = exercises.every(ex => isExerciseCompleted(key, ex.id));
  const completeEl = document.getElementById('sessionComplete');
  const scSub = document.getElementById('scSub');
  if (allDone && exercises.length > 0) {
    completeEl.classList.add('visible');
    scSub.textContent = sess === 'morning' ? 'Routine matin complète' : `${PROGRAM.phases[pi].evening.days[state.currentDay].focus} terminé`;
  } else {
    completeEl.classList.remove('visible');
  }

  document.getElementById('exerciseList').innerHTML = exercises.map((ex, i) => {
    const done = isExerciseCompleted(key, ex.id);
    const targetsHtml = (ex.targets||[]).map(t => `<span class="ex-target">${t}</span>`).join('');
    const equipHtml = ex.equip ? `<div class="ex-equip">🔧 ${ex.equip}</div>` : '';
    const tipHtml = ex.tip ? `<div class="ex-tip">${ex.tip}</div>` : '';
    const videoHtml = ex.video ? `<a class="ex-video" href="${ex.video}" target="_blank" onclick="event.stopPropagation()">▶ Vidéo</a>` : '';
    
    return `
    <div class="exercise-card ${done?'completed':''}" id="card-${ex.id}" style="animation-delay:${i*0.05}s">
      <div class="ex-main" onclick="handleCheck('${key}','${ex.id}',event)">
        <div class="ex-check">
          <svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg>
        </div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-meta">${(ex.meta||[]).map(m => `<span>${m}</span>`).join('')}</div>
        </div>
        <div class="ex-expand" onclick="handleExpand('${ex.id}',event)">▾</div>
      </div>
      <div class="ex-detail">
        <div class="ex-detail-inner">
          ${equipHtml}
          <div class="ex-instructions">${ex.instructions||''}</div>
          <div class="ex-targets">${targetsHtml}</div>
          ${tipHtml}
          ${videoHtml}
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderStats() {
  const today = new Date(getTodayStr());
  const start = new Date(state.startDate);
  
  // Count total completed sessions
  let totalSessions = 0;
  let totalExercises = 0;
  let streak = 0;
  let daysTracked = [];
  
  Object.keys(state.completed).forEach(key => {
    if (state.completed[key].length > 0) {
      totalExercises += state.completed[key].length;
      const date = key.split('_')[0];
      if (!daysTracked.includes(date)) daysTracked.push(date);
    }
  });
  totalSessions = daysTracked.length;

  // Calculate streak
  const check = new Date(today);
  while(true) {
    const ds = check.toISOString().split('T')[0];
    const dow = check.getDay();
    if (dow === 0 || dow === 6) { check.setDate(check.getDate()-1); continue; }
    if (daysTracked.includes(ds)) { streak++; check.setDate(check.getDate()-1); }
    else break;
  }

  const week = getCurrentWeek();

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Semaine</div>
      <div class="stat-value">${week}<span style="font-size:0.8rem;color:var(--text-dim)"> /6</span></div>
      <div class="stat-sub">${PROGRAM.phases[getPhaseForWeek(week)].name}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Streak actuel</div>
      <div class="stat-value" style="color:var(--accent)">${streak}<span style="font-size:0.8rem;color:var(--text-dim)"> jours</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Jours actifs</div>
      <div class="stat-value" style="color:var(--green)">${totalSessions}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Exercices faits</div>
      <div class="stat-value" style="color:var(--accent-3)">${totalExercises}</div>
    </div>
  `;

  // Calendar
  const calGrid = document.getElementById('calendarGrid');
  const headers = ['L','M','M','J','V','S','D'];
  let calHtml = headers.map(h => `<div class="cal-header">${h}</div>`).join('');
  
  // Start from the start date's week
  const calStart = new Date(start);
  calStart.setDate(calStart.getDate() - ((calStart.getDay() + 6) % 7)); // Monday
  
  for (let i = 0; i < 42; i++) {
    const d = new Date(calStart);
    d.setDate(d.getDate() + i);
    const ds = d.toISOString().split('T')[0];
    const dayNum = d.getDate();
    const isFuture = d > today;
    const isToday = ds === getTodayStr();
    const status = isDateFullyComplete(ds);
    
    let cls = 'cal-day';
    if (isFuture) cls += ' future';
    if (isToday) cls += ' today';
    if (status === 'done') cls += ' done';
    else if (status === 'partial') cls += ' partial';
    
    calHtml += `<div class="${cls}">${dayNum}</div>`;
  }
  calGrid.innerHTML = calHtml;
}

function renderTests() {
  document.getElementById('testCards').innerHTML = TESTS.map(test => {
    const history = state.tests[test.id] || [];
    const historyHtml = history.length > 0 ? `
      <div class="test-history">
        ${history.map(h => `
          <div class="test-history-row">
            <span>${h.date}</span>
            <span style="font-family:'Space Mono',monospace;font-weight:700;color:var(--accent)">${h.value} ${test.unit}</span>
            <span style="color:var(--text-muted)">Sem ${h.week}</span>
          </div>
        `).join('')}
      </div>
    ` : '';

    return `
    <div class="test-card">
      <div class="test-title">${test.name}</div>
      <div class="test-desc">${test.desc}</div>
      <div class="test-inputs">
        <div class="test-input-group" style="flex:2">
          <div class="test-input-label">Valeur (${test.unit})</div>
          <input type="text" class="test-input" id="test-val-${test.id}" placeholder="${test.placeholder}" inputmode="numeric">
        </div>
        <div class="test-input-group" style="flex:1">
          <div class="test-input-label">Semaine</div>
          <input type="text" class="test-input" id="test-week-${test.id}" placeholder="${getCurrentWeek()}" value="${getCurrentWeek()}" inputmode="numeric">
        </div>
      </div>
      <button class="test-save-btn" onclick="saveTest('${test.id}')">Enregistrer</button>
      ${historyHtml}
    </div>`;
  }).join('');
}

// ============================================================
// ACTIONS
// ============================================================
function setPhase(idx) {
  state.currentPhase = idx;
  state.currentDay = 0;
  saveState();
  renderAll();
}

function setSession(sess) {
  state.currentSession = sess;
  saveState();
  renderSessionToggle();
  renderDayTabs();
  renderExercises();
}

function setDay(idx) {
  state.currentDay = idx;
  saveState();
  renderDayTabs();
  renderExercises();
}

function handleCheck(key, exId, event) {
  // Don't check if clicking expand
  if (event.target.closest('.ex-expand')) return;
  
  toggleExercise(key, exId);
  const card = document.getElementById('card-' + exId);
  if (card) {
    card.classList.toggle('completed');
    if (isExerciseCompleted(key, exId)) {
      card.classList.add('just-checked');
      setTimeout(() => card.classList.remove('just-checked'), 300);
    }
  }
  
  // Update session complete badge and session toggle
  setTimeout(() => {
    renderSessionToggle();
    renderDayTabs();
    renderExercises();
    renderHeader();
  }, 150);
}

function handleExpand(exId, event) {
  event.stopPropagation();
  const card = document.getElementById('card-' + exId);
  if (card) card.classList.toggle('open');
}

function switchPage(page) {
  state.currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + page).classList.add('active');
  if (page === 'stats') renderStats();
  if (page === 'tests') renderTests();
}

function saveTest(testId) {
  const val = document.getElementById('test-val-' + testId).value.trim();
  const week = document.getElementById('test-week-' + testId).value.trim() || getCurrentWeek();
  if (!val) return;
  
  if (!state.tests[testId]) state.tests[testId] = [];
  state.tests[testId].push({
    value: val,
    week: week,
    date: new Date().toLocaleDateString('fr-FR')
  });
  saveState();
  renderTests();
  document.getElementById('test-val-' + testId).value = '';
}

// ============================================================
// INIT
// ============================================================
loadState();

// Auto-detect phase based on week
const autoWeek = getCurrentWeek();
state.currentPhase = getPhaseForWeek(autoWeek);

// Auto-detect day
const dow = getDayOfWeek();
if (dow >= 1 && dow <= 5) {
  state.currentDay = dow - 1;
}
saveState();

renderAll();
</script>
